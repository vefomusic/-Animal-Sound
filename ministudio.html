<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandLab-Style DAW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e14;
            color: #e1e4e8;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: #161b22;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #21262d;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fb6340;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transport-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .transport-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e1e4e8;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .transport-btn:hover {
            background: #30363d;
            border-color: #fb6340;
        }

        .transport-btn.play {
            background: #fb6340;
            border-color: #fb6340;
            color: white;
        }

        .transport-btn.play:hover {
            background: #ff7a5c;
        }

        .bpm-display {
            background: #21262d;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-size: 14px;
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #161b22;
            border-right: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid #21262d;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .track-folder {
            background: #0d1117;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #21262d;
            overflow: hidden;
        }

        .folder-header {
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }

        .folder-header:hover {
            background: #161b22;
        }

        .folder-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .folder-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .folder-icon.bass {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .folder-icon.kick {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .folder-icon.melody {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .folder-name {
            font-weight: 600;
            font-size: 13px;
        }

        .folder-count {
            font-size: 11px;
            color: #8b949e;
        }

        .folder-toggle {
            color: #8b949e;
            transition: transform 0.2s;
        }

        .folder-toggle.open {
            transform: rotate(90deg);
        }

        .folder-tracks {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .folder-tracks.open {
            max-height: 500px;
        }

        .track-item {
            padding: 10px 12px;
            background: #0d1117;
            border-top: 1px solid #21262d;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .track-item:hover {
            background: #161b22;
        }

        .track-item.active {
            background: #1c2128;
            border-left: 3px solid #fb6340;
        }

        .track-color {
            width: 4px;
            height: 24px;
            border-radius: 2px;
        }

        .track-details {
            flex: 1;
        }

        .track-name {
            font-size: 12px;
            font-weight: 500;
        }

        .track-type {
            font-size: 10px;
            color: #8b949e;
        }

        .track-mute {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid #30363d;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .track-mute:hover {
            background: #21262d;
            color: #e1e4e8;
        }

        .track-mute.muted {
            background: #fb6340;
            border-color: #fb6340;
            color: white;
        }

        .add-track-btn {
            background: linear-gradient(135deg, #fb6340 0%, #ff8c42 100%);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .add-track-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(251, 99, 64, 0.3);
        }

        /* Arrangement View */
        .arrangement-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0d1117;
        }

        .timeline-header {
            height: 50px;
            background: #161b22;
            border-bottom: 1px solid #21262d;
            display: flex;
            align-items: center;
            padding: 0 20px;
            position: relative;
        }

        .timeline-ruler {
            display: flex;
            height: 100%;
            align-items: center;
            gap: 60px;
            padding-left: 40px;
        }

        .bar-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .bar-number {
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
        }

        .bar-line {
            width: 2px;
            height: 12px;
            background: #30363d;
        }

        .tracks-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            position: relative;
        }

        .track-row {
            height: 80px;
            border-bottom: 1px solid #21262d;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 20px;
            transition: background 0.2s;
        }

        .track-row:hover {
            background: #161b22;
        }

        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: #21262d;
        }

        .grid-line.strong {
            background: #30363d;
            width: 2px;
        }

        .clip {
            position: absolute;
            height: 60px;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: move;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .clip:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .clip.bass {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .clip.kick {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .clip.melody {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .clip-name {
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .clip-waveform {
            height: 20px;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .waveform-bar {
            width: 3px;
            background: rgba(255,255,255,0.4);
            border-radius: 2px;
        }

        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #fb6340;
            z-index: 100;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(251, 99, 64, 0.5);
        }

        .playhead-handle {
            position: absolute;
            top: -8px;
            left: -6px;
            width: 14px;
            height: 14px;
            background: #fb6340;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(251, 99, 64, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                🎵 BandLab Studio
            </div>
            <div class="transport-controls">
                <button class="transport-btn" id="stopBtn">⏹</button>
                <button class="transport-btn play" id="playBtn">▶</button>
                <button class="transport-btn" id="recordBtn">⏺</button>
                <div class="bpm-display">120 BPM</div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="transport-btn">💾</button>
                <button class="transport-btn">⚙️</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="section-title">Tracks</div>
                    
                    <!-- Bass Folder -->
                    <div class="track-folder">
                        <div class="folder-header" onclick="toggleFolder('bass')">
                            <div class="folder-info">
                                <div class="folder-icon bass">🎸</div>
                                <div>
                                    <div class="folder-name">Bass</div>
                                    <div class="folder-count">2 tracks</div>
                                </div>
                            </div>
                            <span class="folder-toggle" id="bass-toggle">▶</span>
                        </div>
                        <div class="folder-tracks" id="bass-tracks">
                            <div class="track-item active">
                                <div class="track-color" style="background: #667eea;"></div>
                                <div class="track-details">
                                    <div class="track-name">Sub Bass</div>
                                    <div class="track-type">Synth</div>
                                </div>
                                <button class="track-mute">M</button>
                            </div>
                            <div class="track-item">
                                <div class="track-color" style="background: #764ba2;"></div>
                                <div class="track-details">
                                    <div class="track-name">Bass Guitar</div>
                                    <div class="track-type">Audio</div>
                                </div>
                                <button class="track-mute">M</button>
                            </div>
                        </div>
                    </div>

                    <!-- Kick Folder -->
                    <div class="track-folder">
                        <div class="folder-header" onclick="toggleFolder('kick')">
                            <div class="folder-info">
                                <div class="folder-icon kick">🥁</div>
                                <div>
                                    <div class="folder-name">Kick</div>
                                    <div class="folder-count">2 tracks</div>
                                </div>
                            </div>
                            <span class="folder-toggle" id="kick-toggle">▶</span>
                        </div>
                        <div class="folder-tracks" id="kick-tracks">
                            <div class="track-item">
                                <div class="track-color" style="background: #f093fb;"></div>
                                <div class="track-details">
                                    <div class="track-name">Kick 808</div>
                                    <div class="track-type">Drum</div>
                                </div>
                                <button class="track-mute">M</button>
                            </div>
                            <div class="track-item">
                                <div class="track-color" style="background: #f5576c;"></div>
                                <div class="track-details">
                                    <div class="track-name">Kick Layer</div>
                                    <div class="track-type">Sample</div>
                                </div>
                                <button class="track-mute">M</button>
                            </div>
                        </div>
                    </div>

                    <!-- Melody Folder -->
                    <div class="track-folder">
                        <div class="folder-header" onclick="toggleFolder('melody')">
                            <div class="folder-info">
                                <div class="folder-icon melody">🎹</div>
                                <div>
                                    <div class="folder-name">Melody</div>
                                    <div class="folder-count">1 track</div>
                                </div>
                            </div>
                            <span class="folder-toggle" id="melody-toggle">▶</span>
                        </div>
                        <div class="folder-tracks" id="melody-tracks">
                            <div class="track-item">
                                <div class="track-color" style="background: #4facfe;"></div>
                                <div class="track-details">
                                    <div class="track-name">Lead Synth</div>
                                    <div class="track-type">Synth</div>
                                </div>
                                <button class="track-mute">M</button>
                            </div>
                        </div>
                    </div>

                    <button class="add-track-btn">+ Add Track</button>
                </div>
            </div>

            <!-- Arrangement View -->
            <div class="arrangement-view">
                <div class="timeline-header">
                    <div class="timeline-ruler">
                        <div class="bar-marker">
                            <div class="bar-number">1</div>
                            <div class="bar-line"></div>
                        </div>
                        <div class="bar-marker">
                            <div class="bar-number">2</div>
                            <div class="bar-line"></div>
                        </div>
                        <div class="bar-marker">
                            <div class="bar-number">3</div>
                            <div class="bar-line"></div>
                        </div>
                        <div class="bar-marker">
                            <div class="bar-number">4</div>
                            <div class="bar-line"></div>
                        </div>
                        <div class="bar-marker">
                            <div class="bar-number">5</div>
                            <div class="bar-line"></div>
                        </div>
                        <div class="bar-marker">
                            <div class="bar-number">6</div>
                            <div class="bar-line"></div>
                        </div>
                        <div class="bar-marker">
                            <div class="bar-number">7</div>
                            <div class="bar-line"></div>
                        </div>
                        <div class="bar-marker">
                            <div class="bar-number">8</div>
                            <div class="bar-line"></div>
                        </div>
                    </div>
                    <div class="playhead" id="playhead">
                        <div class="playhead-handle"></div>
                    </div>
                </div>

                <div class="tracks-container" id="tracksContainer">
                    <!-- Grid Lines -->
                    <div class="grid-lines">
                        <div class="grid-line strong" style="left: 40px;"></div>
                        <div class="grid-line" style="left: 100px;"></div>
                        <div class="grid-line" style="left: 160px;"></div>
                        <div class="grid-line" style="left: 220px;"></div>
                        <div class="grid-line strong" style="left: 280px;"></div>
                        <div class="grid-line" style="left: 340px;"></div>
                        <div class="grid-line" style="left: 400px;"></div>
                        <div class="grid-line" style="left: 460px;"></div>
                        <div class="grid-line strong" style="left: 520px;"></div>
                    </div>

                    <!-- Bass Tracks -->
                    <div class="track-row">
                        <div class="clip bass" style="left: 40px; width: 180px;">
                            <div class="clip-name">Sub Bass Loop</div>
                            <div class="clip-waveform">
                                <div class="waveform-bar" style="height: 40%;"></div>
                                <div class="waveform-bar" style="height: 70%;"></div>
                                <div class="waveform-bar" style="height: 90%;"></div>
                                <div class="waveform-bar" style="height: 60%;"></div>
                                <div class="waveform-bar" style="height: 80%;"></div>
                                <div class="waveform-bar" style="height: 50%;"></div>
                            </div>
                        </div>
                        <div class="clip bass" style="left: 280px; width: 240px;">
                            <div class="clip-name">Sub Bass Chorus</div>
                            <div class="clip-waveform">
                                <div class="waveform-bar" style="height: 60%;"></div>
                                <div class="waveform-bar" style="height: 85%;"></div>
                                <div class="waveform-bar" style="height: 95%;"></div>
                                <div class="waveform-bar" style="height: 70%;"></div>
                                <div class="waveform-bar" style="height: 90%;"></div>
                                <div class="waveform-bar" style="height: 55%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="track-row">
                        <div class="clip bass" style="left: 160px; width: 120px;">
                            <div class="clip-name">Bass Guitar</div>
                            <div class="clip-waveform">
                                <div class="waveform-bar" style="height: 55%;"></div>
                                <div class="waveform-bar" style="height: 75%;"></div>
                                <div class="waveform-bar" style="height: 85%;"></div>
                                <div class="waveform-bar" style="height: 65%;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Kick Tracks -->
                    <div class="track-row">
                        <div class="clip kick" style="left: 40px; width: 480px;">
                            <div class="clip-name">Kick 808 Pattern</div>
                            <div class="clip-waveform">
                                <div class="waveform-bar" style="height: 100%;"></div>
                                <div class="waveform-bar" style="height: 30%;"></div>
                                <div class="waveform-bar" style="height: 100%;"></div>
                                <div class="waveform-bar" style="height: 30%;"></div>
                                <div class="waveform-bar" style="height: 100%;"></div>
                                <div class="waveform-bar" style="height: 30%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="track-row">
                        <div class="clip kick" style="left: 280px; width: 180px;">
                            <div class="clip-name">Kick Layer Drop</div>
                            <div class="clip-waveform">
                                <div class="waveform-bar" style="height: 95%;"></div>
                                <div class="waveform-bar" style="height: 40%;"></div>
                                <div class="waveform-bar" style="height: 95%;"></div>
                                <div class="waveform-bar" style="height: 40%;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Melody Track -->
                    <div class="track-row">
                        <div class="clip melody" style="left: 160px; width: 360px;">
                            <div class="clip-name">Lead Synth Melody</div>
                            <div class="clip-waveform">
                                <div class="waveform-bar" style="height: 65%;"></div>
                                <div class="waveform-bar" style="height: 80%;"></div>
                                <div class="waveform-bar" style="height: 70%;"></div>
                                <div class="waveform-bar" style="height: 85%;"></div>
                                <div class="waveform-bar" style="height: 75%;"></div>
                                <div class="waveform-bar" style="height: 60%;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isPlaying = false;
        let playheadPosition = 40;

        function toggleFolder(folderId) {
            const tracks = document.getElementById(`${folderId}-tracks`);
            const toggle = document.getElementById(`${folderId}-toggle`);
            
            tracks.classList.toggle('open');
            toggle.classList.toggle('open');
        }

        document.getElementById('playBtn').addEventListener('click', function() {
            isPlaying = !isPlaying;
            this.textContent = isPlaying ? '⏸' : '▶';
            
            if (isPlaying) {
                animatePlayhead();
            }
        });

        document.getElementById('stopBtn').addEventListener('click', function() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶';
            playheadPosition = 40;
            document.getElementById('playhead').style.left = playheadPosition + 'px';
        });

        function animatePlayhead() {
            if (!isPlaying) return;
            
            playheadPosition += 2;
            if (playheadPosition > 600) playheadPosition = 40;
            
            document.getElementById('playhead').style.left = playheadPosition + 'px';
            requestAnimationFrame(animatePlayhead);
        }

        // Mute button functionality
        document.querySelectorAll('.track-mute').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                this.classList.toggle('muted');
            });
        });

        // Track selection
        document.querySelectorAll('.track-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.track-item').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
